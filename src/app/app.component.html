          <a class="nav-link active" [routerLink]="['basic']">Examples</a>

        <li class="nav-item">
          <a class="nav-link" href="https://github.com/alexandroit/angular-multiselect-dropdown" target="_blank">GitHub</a>

<div class="container-fluid">
  <div class="row d-flex">
    <nav id="sidebarMenu" class="col d-md-block sidebar collapse">
      <div class="position-sticky pt-3">
        <ul class="nav flex-column">
          <span *ngFor="let link of links">
            <li class="nav-item">
              <a class="nav-link" *ngIf="link.path !== ''" [routerLink]="[link.path]" routerLinkActive="active">
                <span data-feather="home"></span>
                {{ link.data.label }}
              </a>
            </li>
          </span>
        </ul>
      </div>
    </nav>
    <main class="col center-content pt-4">
      <h4 class="mb-4">{{ currentComponent.label }}</h4>
      <div class="nav nav-tabs">
        <button type="button" class="nav-link" [class.active]="active === 1" (click)="active = 1">Demo</button>
        <button type="button" class="nav-link" [class.active]="active === 2" (click)="active = 2">Source</button>
      </div>
      <div class="mt-2">
        <div class="pt-5" *ngIf="active === 1">
          <router-outlet></router-outlet>
        </div>
        <stackline-source
          *ngIf="active === 2"
          [tstitle]="currentComponent.tstitle"
          [htmltitle]="currentComponent.htmltitle"
          [csstitle]="currentComponent.csstitle"
          [tsgist]="currentComponent.tsgist"
          [htmlgist]="currentComponent.htmlgist"
          [cssgist]="currentComponent.cssgist">
        </stackline-source>
      </div>
    </main>
  </div>
</div>
