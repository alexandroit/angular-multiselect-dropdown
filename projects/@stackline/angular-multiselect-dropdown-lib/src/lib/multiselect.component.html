<div class="stackline-dropdown" [ngClass]="getDropdownClasses()" (clickOutside)="closeDropdownOnClickOut($event)" #stacklineDropdown>
    <div class="selected-list" #selectedList>
        <div class="c-btn"
            #triggerButton
            (click)="toggleDropdown($event)"
            (keydown)="onTriggerKeydown($event)"
            [ngClass]="{'disabled': settings.disabled, 'is-active': isActive, 'has-selection': selectedItems?.length > 0, 'single-select-mode': settings.singleSelection}"
            [attr.tabindex]="settings.disabled ? -1 : 0"
            role="combobox"
            aria-haspopup="listbox"
            [attr.aria-controls]="listboxId"
            [attr.aria-expanded]="isActive"
            [attr.aria-disabled]="settings.disabled"
            [attr.aria-activedescendant]="activeDescendantId"
            [attr.aria-label]="settings.ariaLabelledBy ? null : getAriaLabel()"
            [attr.aria-labelledby]="settings.ariaLabelledBy || null">

            <span class="c-placeholder" *ngIf="selectedItems?.length == 0">{{settings.text}}</span>
            <span class="c-single-value" *ngIf="settings.singleSelection && !badgeTempl">
                <span *ngFor="let item of selectedItems;trackBy: trackByFn.bind(this);let k = index">
                    {{item[settings.labelKey]}}
                </span>
            </span>
            <span class="c-list c-chip-list" *ngIf="selectedItems?.length > 0 && settings.singleSelection && badgeTempl ">
                <div class="c-token" *ngFor="let item of selectedItems;trackBy: trackByFn.bind(this);let k = index">
                    <span *ngIf="!badgeTempl" class="c-label">{{item[settings.labelKey]}}</span>

                    <span *ngIf="badgeTempl" class="c-label">
                        <c-templateRenderer [data]="badgeTempl" [item]="item" [context]="getTemplateContext(item,k,'badge')"></c-templateRenderer>
                    </span>
                    <button type="button" class="c-remove" (click)="onItemClick(item,k,$event);$event.stopPropagation()" (keydown)="onRemoveButtonKeydown(item,k,$event)" [attr.aria-label]="getRemoveItemAriaLabel(item)">
                        <c-icon [name]="'remove'"></c-icon>
                    </button>
                </div>
            </span>
            <div class="c-list c-chip-list" *ngIf="selectedItems?.length > 0 && !settings.singleSelection">
                <ng-container *ngFor="let item of selectedItems;trackBy: trackByFn.bind(this);let k = index">
                    <div class="c-token" *ngIf="shouldShowSelectedBadge(k)">
                        <span *ngIf="!badgeTempl" class="c-label">{{item[settings.labelKey]}}</span>
                        <span *ngIf="badgeTempl" class="c-label">
                            <c-templateRenderer [data]="badgeTempl" [item]="item" [context]="getTemplateContext(item,k,'badge')"></c-templateRenderer>
                        </span>
                        <button type="button" class="c-remove" (click)="onItemClick(item,k,$event);$event.stopPropagation()" (keydown)="onRemoveButtonKeydown(item,k,$event)" [attr.aria-label]="getRemoveItemAriaLabel(item)">
                            <c-icon [name]="'remove'"></c-icon>
                        </button>
                    </div>
                </ng-container>
            </div>
            <span class="countplaceholder" *ngIf="getHiddenSelectedCount() > 0">+{{getHiddenSelectedCount()}}</span>
            <button type="button" class="c-remove clear-all" *ngIf="settings.clearAll && selectedItems?.length > 0 && !settings.disabled" (click)="clearSelection($event);$event.stopPropagation()" (keydown)="onClearAllKeydown($event)" [attr.aria-label]="getClearAllAriaLabel()">
                <c-icon [name]="'remove'"></c-icon>
            </button>
            <button type="button" class="c-arrow-toggle" [ngClass]="isActive ? 'c-angle-up' : 'c-angle-down'" [disabled]="settings.disabled" (click)="toggleDropdown($event);$event.stopPropagation()" (keydown)="onArrowButtonKeydown($event)" [attr.aria-label]="isActive ? getCloseDropdownAriaLabel() : getOpenDropdownAriaLabel()" [attr.aria-controls]="listboxId" [attr.aria-expanded]="isActive">
                <c-icon [name]="isActive ? 'angle-up' : 'angle-down'"></c-icon>
            </button>
        </div>
    </div>
    <div #dropdownList class="dropdown-list animated fadeIn"
    [ngClass]="getDropdownPanelClasses()"
    [style.width]="dropDownWidth !== null ? dropDownWidth + 'px' : 'auto'"
    [style.top]="dropDownTop" 
    [style.bottom]="dropDownBottom"
    [style.left.px]="dropDownLeft" 
        (pointerdown)="onDropdownPanelPointerDown($event)"
        (touchstart)="onDropdownPanelPointerDown($event)"
        role="presentation"
        [attr.aria-hidden]="!isActive"
        [hidden]="!isActive">
        <div [ngClass]="{'arrow-up': !isDropdownOpenTowardsTop(), 'arrow-down': isDropdownOpenTowardsTop()}" class="arrow-2"></div>
        <div [ngClass]="{'arrow-up': !isDropdownOpenTowardsTop(), 'arrow-down': isDropdownOpenTowardsTop()}"></div>

                [id]="id" (change)="toggleSelectAll($event)"/>
                <label [for]="id">
                    <span [hidden]="isSelectAll">{{settings.selectAllText}}</span>
                    <span [hidden]="!isSelectAll">{{settings.unSelectAllText}}</span>
                </label>
            </div>
            <img class="loading-icon" *ngIf="loading" src="assets/img/loading.gif" [attr.alt]="settings.loadingText" />

                    <c-icon [name]="'clear'"></c-icon>
                </button>

                <input class="c-input" *ngIf="settings.lazyLoading && !searchTempl" #searchInput type="text" [placeholder]="settings.searchPlaceholderText"

            </div>
            <div class="filter-select-all" *ngIf="!settings.lazyLoading && settings.enableFilterSelectAll && !isDisabledItemPresent">
